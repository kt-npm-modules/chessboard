<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Renderer test</title>

		<style>
			#board {
				width: 600px;
				height: 600px;
			}
		</style>
	</head>
	<body>
		<div id="board"></div>

		<script type="module">
			import { createBoardState } from '../../../dist/manual/state/boardState.js';
			import { createInvalidationState } from '../../../dist/manual/scheduler/invalidationState.js';
			import { makeRenderGeometry } from '../../../dist/manual/renderer/geometry.js';
			import { SvgRenderer } from '../../../dist/manual/renderer/SvgRenderer.js';
			import { DirtyLayer } from '../../../dist/manual/scheduler/types.js';

			const boardState = createBoardState();
			const invalidationState = createInvalidationState();
			console.log(boardState);
			const geometry = makeRenderGeometry(600, 'black');
			console.log(geometry.boardSize);
			console.log(geometry.squareRect(0));
			const container = document.getElementById('board');

			const renderer = new SvgRenderer({
				spriteUrl: '/assets/pieces/cburnett/pieces.svg'
			});
			renderer.mount(container);
			renderer.render(boardState, { layers: DirtyLayer.All }, geometry);

			console.log(renderer);
		</script>
	</body>
</html>
